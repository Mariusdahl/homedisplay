<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=2048, initial-scale=1.0" />
  <title>Our Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #111111;
      --surface-2:  #181818;
      --border:     #242424;
      --border-lt:  #2e2e2e;

      --text:       #f0ebe3;
      --muted:      #7a7570;

      --pink-hi:    #f472b6;
      --pink-mid:   #c0607e;
      --pink-dim:   #7b3050;

      --offwhite:   #f0ebe3;
      --offwhite-2: #c9c3bb;

      --radius:     20px;
      --font-body:  'Archivo', sans-serif;
      --font-disp:  'Archivo', sans-serif;

      /* Layout tuned for 2048×1536 */
      --header-h:   80px;
      --page-pad:   48px;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      /* prevent the calendar from creating scroll on large screens */
      overflow: hidden;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .028;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Page ── */
    .page {
      position: relative;
      z-index: 1;
      height: 100vh;
      padding: var(--page-pad);
      display: flex;
      flex-direction: column;
    }

    /* ── Calendar card ── */
    .card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color .3s;
      /* subtle pink glow */
      box-shadow:
        0 0 0 1px rgba(123,48,80,.06),
        0 8px 60px rgba(0,0,0,.4),
        inset 0 1px 0 rgba(255,255,255,.03);
    }

    .card:hover { border-color: #2b1820; }

    .card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 30px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: linear-gradient(90deg, rgba(123,48,80,.1) 0%, transparent 60%);
    }

    .card-title {
      font-family: var(--font-disp);
      font-size: 1.0rem;
      font-weight: 500;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--offwhite);
      flex: 1;
    }

    .pill {
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .09em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--pink-dim);
      color: var(--pink-hi);
      background: rgba(123,48,80,.18);
    }

    /* thin pink accent line at top of card */
    .card::before {
      content: '';
      display: block;
      height: 2px;
      background: linear-gradient(90deg, var(--pink-dim), var(--pink-hi) 40%, transparent 100%);
      flex-shrink: 0;
    }

    /* ── Calendar iframe ── */
    .cal-wrap {
      flex: 1;
      position: relative;
    }
    .cal-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
      filter: invert(1) hue-rotate(180deg) brightness(.88) saturate(1.2) contrast(1.05);
    }

    /* ── Responsive fallback (small screens) ── */
    @media (max-width: 900px) {
      :root {
        --header-h:  64px;
        --page-pad:  20px;
      }
      .logo-word, .logo-amp { font-size: 1.1rem; }
      html, body { overflow: auto; }
      .page { height: auto; min-height: calc(100vh - var(--header-h)); }
      .card { min-height: 600px; }
    }
  </style>
</head>
<body>



<div class="page">
  <div class="card">

    <div class="cal-wrap">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=c_0afd4c2d6cf6502a6bfe2df7aa9f93dc5fcb4518093656dd2d853bb17de6c0cd%40group.calendar.google.com&ctz=Europe%2FCopenhagen"
        loading="lazy"
      ></iframe>
    </div>
  </div>
</div>


<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">
  <svg id="fs-icon-enter" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  <svg id="fs-icon-exit" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
</button>

<style>
  #fs-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 200;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(17,17,17,.85);
    border: 1px solid #2e2e2e;
    color: #7a7570;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: color .15s, border-color .15s, box-shadow .15s;
  }
  #fs-btn:hover {
    color: #f472b6;
    border-color: #7b3050;
    box-shadow: 0 0 18px rgba(244,114,182,.2);
  }
  #fs-btn svg { width: 16px; height: 16px; }
</style>

<script>
  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
    } else {
      document.exitFullscreen();
    }
  }
  document.addEventListener('fullscreenchange', () => {
    const isFs = !!document.fullscreenElement;
    document.getElementById('fs-icon-enter').style.display = isFs ? 'none' : '';
    document.getElementById('fs-icon-exit').style.display  = isFs ? ''     : 'none';
  });
</script>

</body>
</html>
