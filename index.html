<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=2048, initial-scale=1.0" />
  <title>Family Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0a0a0a;
      --surface:    #111111;
      --surface-2:  #181818;
      --border:     #242424;
      --border-lt:  #2e2e2e;
      --text:       #f0ebe3;
      --muted:      #7a7570;
      --pink-hi:    #f472b6;
      --pink-mid:   #c0607e;
      --pink-dim:   #7b3050;
      --offwhite:   #f0ebe3;
      --offwhite-2: #c9c3bb;
      --radius:     16px;
      --font:       'Archivo', sans-serif;
      --page-pad:   32px;
    }

    html, body {
      width: 100%; height: 100%;
      max-width: 100vw; max-height: 100vh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: .025;
      pointer-events: none;
      z-index: 0;
    }

    .dashboard {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: var(--page-pad);
      padding: var(--page-pad);
      height: 100vh;
      max-height: 100vh;
      overflow: hidden;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
      max-height: calc(100vh - (var(--page-pad) * 2));
      overflow: hidden;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 40px rgba(0,0,0,.35);
      transition: border-color .3s;
    }
    .card-fill { flex: 1; min-height: 0; }

    .card-top { height: 2px; flex-shrink: 0; }
    .pink-top  { background: linear-gradient(90deg, var(--pink-dim), var(--pink-hi) 50%, transparent); }
    .white-top { background: linear-gradient(90deg, #2a2a2a, #444 50%, transparent); }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 13px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .card-header h2 {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--offwhite-2);
      flex: 1;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .dot-on  { background: var(--pink-hi); box-shadow: 0 0 6px var(--pink-hi); }
    .dot-off { background: var(--border-lt); }

    .refresh-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #2a2a2a;
      flex-shrink: 0;
      transition: background .3s;
    }
    .refresh-dot.active { background: var(--pink-hi); }

    .action-btn {
      background: transparent;
      border: 1px solid var(--border-lt);
      border-radius: 8px;
      color: var(--muted);
      font-family: var(--font);
      font-size: .68rem;
      font-weight: 500;
      letter-spacing: .04em;
      padding: 4px 12px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: color .15s, border-color .15s;
    }
    .action-btn:hover           { color: var(--pink-hi); border-color: var(--pink-dim); }
    .action-btn.danger:hover    { color: #f87171; border-color: #7f1d1d; }

    /* ── Task list ── */
    .task-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px 12px;
      scrollbar-width: thin;
      scrollbar-color: #1e1e1e transparent;
    }
    .task-body::-webkit-scrollbar { width: 3px; }
    .task-body::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    .task-section-label {
      font-size: .58rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #2e2e2e;
      padding: 10px 4px 4px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 6px;
      border-radius: 8px;
      transition: background .15s, opacity .35s, transform .35s;
    }
    .task-item:hover { background: var(--surface-2); }
    .task-item.completing { opacity: 0; transform: translateX(8px); }

    .task-check {
      width: 17px; height: 17px;
      border-radius: 50%;
      border: 1.5px solid #2e2e2e;
      flex-shrink: 0;
      margin-top: 1px;
      cursor: pointer;
      position: relative;
      transition: border-color .2s, background .2s;
    }
    .task-check:hover         { border-color: var(--pink-mid); }
    .task-check.striking      { background: #1a1a1a; border-color: #2a2a2a; }
    .task-check.striking::after {
      content: '';
      position: absolute; inset: 3px;
      border-radius: 50%;
      background: #333;
    }

    .task-info { flex: 1; min-width: 0; }
    .task-title {
      font-size: .83rem;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      transition: color .35s;
    }
    .task-title.striking { text-decoration: line-through; color: #3a3a3a; }

    .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
    .task-due         { font-size: .67rem; color: var(--muted); }
    .task-due.overdue { color: #f87171; }
    .task-due.today   { color: var(--pink-hi); }

    .task-star  { font-size: .75rem; color: #f59e0b; flex-shrink: 0; margin-top: 1px; }
    .task-notes { font-size: .7rem; color: #484848; margin-top: 2px; line-height: 1.4; }

    .state-msg {
      padding: 28px 16px;
      text-align: center;
      font-size: .78rem;
      color: #2e2e2e;
      line-height: 1.8;
    }
    .state-msg .big { font-size: 1.8rem; display: block; margin-bottom: 10px; opacity: .25; }
    .state-msg a {
      color: var(--pink-mid);
      text-decoration: none;
      border-bottom: 1px solid var(--pink-dim);
    }

    /* ── Clock ── */
    .datetime-body { padding: 18px 20px 16px; }
    .dt-time {
      font-size: 2.6rem;
      font-weight: 300;
      letter-spacing: -.02em;
      color: var(--offwhite);
      line-height: 1;
    }
    .dt-time span { color: var(--pink-hi); }
    .dt-date {
      font-size: .72rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── Calendar ── */
    .cal-wrap { flex: 1; position: relative; min-height: 0; }
    .cal-wrap iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none;
      display: block;
      filter: invert(1) hue-rotate(180deg) brightness(.88) saturate(1.2) contrast(1.05);
    }

    /* ── Fullscreen ── */
    #fs-btn {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 300;
      width: 38px; height: 38px;
      border-radius: 10px;
      background: rgba(17,17,17,.9);
      border: 1px solid #2a2a2a;
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      transition: color .15s, border-color .15s, box-shadow .15s;
    }
    #fs-btn:hover { color: var(--pink-hi); border-color: var(--pink-dim); box-shadow: 0 0 14px rgba(244,114,182,.2); }
    #fs-btn svg { width: 13px; height: 13px; }
  </style>
</head>
<body>

<div class="dashboard">

  <!-- ── Calendar ── -->
  <div class="col">
    <div class="card card-fill">
      <div class="card-top pink-top"></div>
      <div class="cal-wrap">
        <iframe
          src="https://calendar.google.com/calendar/embed?src=c_0afd4c2d6cf6502a6bfe2df7aa9f93dc5fcb4518093656dd2d853bb17de6c0cd%40group.calendar.google.com&ctz=Europe%2FCopenhagen"
          loading="lazy"
        ></iframe>
      </div>
    </div>
  </div>

  <!-- ── Clock + Tasks ── -->
  <div class="col">

    <div class="card">
      <div class="card-top white-top"></div>
      <div class="datetime-body">
        <div class="dt-time" id="dt-time">00<span>:</span>00</div>
        <div class="dt-date" id="dt-date">—</div>
      </div>
    </div>

    <div class="card card-fill">
      <div class="card-top pink-top"></div>
      <div class="card-header">
        <h2>Family Tasks</h2>
        <div class="dot dot-off" id="status-dot"></div>
        <div class="refresh-dot" id="refresh-dot"></div>
        <button class="action-btn danger" id="logout-btn" onclick="logout()" style="display:none">Disconnect</button>
      </div>
      <div class="task-body" id="task-body">
        <div class="state-msg">
          <span class="big">📋</span>
          <a href="#" onclick="login()">Sign in with Google</a><br>
          to load your family tasks.
        </div>
      </div>
    </div>

  </div>
</div>

<button id="fs-btn" onclick="toggleFullscreen()" title="Toggle fullscreen">
  <svg id="fs-enter" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  <svg id="fs-exit"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>
</button>

<script>
  // ── Point this at your Render backend URL once deployed ──
  const API = 'https://homedisplay.onrender.com';

  // ── Token storage ─────────────────────────────────────────
  let sessionToken = localStorage.getItem('hd_token') || null;

  function authHeaders() {
    return sessionToken
      ? { 'Authorization': 'Bearer ' + sessionToken }
      : {};
  }

  // On load — check if Google redirected back with a token in the hash
  (function grabTokenFromHash() {
    const hash = window.location.hash;
    if (hash.includes('token=')) {
      const token = hash.split('token=')[1].split('&')[0];
      if (token) {
        sessionToken = token;
        localStorage.setItem('hd_token', token);
        // Clean the token out of the URL
        history.replaceState(null, '', window.location.pathname);
      }
    }
  })();

  // ── Auth ──────────────────────────────────────────────────
  function login()  { window.location.href = API + '/auth/login'; }
  function logout() {
    if (!confirm('Disconnect the shared account?')) return;
    fetch(API + '/auth/logout', {
      method: 'POST',
      headers: authHeaders()
    }).finally(() => {
      sessionToken = null;
      localStorage.removeItem('hd_token');
      setConnected(false);
      renderTasks(null);
    });
  }

  async function checkAuth() {
    if (!sessionToken) return;
    try {
      const res  = await fetch(API + '/auth/status', { headers: authHeaders() });
      const data = await res.json();
      if (data.authenticated) {
        setConnected(true);
        fetchTasks();
      } else {
        sessionToken = null;
        localStorage.removeItem('hd_token');
        setConnected(false);
      }
    } catch(e) {
      console.error('Auth check failed', e);
    }
  }

  function setConnected(yes) {
    document.getElementById('status-dot').className = 'dot ' + (yes ? 'dot-on' : 'dot-off');
    document.getElementById('logout-btn').style.display = yes ? '' : 'none';
  }

  // ── Fetch tasks ───────────────────────────────────────────
  async function fetchTasks() {
    if (!sessionToken) return;
    const rdot = document.getElementById('refresh-dot');
    rdot.classList.add('active');
    setTimeout(() => rdot.classList.remove('active'), 700);

    try {
      const res = await fetch(API + '/tasks', { headers: authHeaders() });
      if (res.status === 401) { setConnected(false); renderTasks(null); return; }
      const data = await res.json();
      renderTasks(data.tasks);
    } catch(e) {
      console.error('fetchTasks', e);
    }
  }

  // ── Render ────────────────────────────────────────────────
  function renderTasks(tasks) {
    const container = document.getElementById('task-body');
    const today = new Date(); today.setHours(0,0,0,0);

    if (!tasks) {
      container.innerHTML = `<div class="state-msg"><span class="big">📋</span><a href="#" onclick="login()">Sign in with Google</a><br>to load your family tasks.</div>`;
      return;
    }
    if (!tasks.length) {
      container.innerHTML = `<div class="state-msg"><span class="big">🎉</span>All done!<br>No tasks remaining.</div>`;
      return;
    }

    // sort: starred → due date → undated
    tasks.sort((a, b) => {
      const aS = a.title.startsWith('★') || a.title.startsWith('*');
      const bS = b.title.startsWith('★') || b.title.startsWith('*');
      if (aS && !bS) return -1;
      if (!aS && bS) return 1;
      if (a.due && b.due) return new Date(a.due) - new Date(b.due);
      if (a.due) return -1;
      if (b.due) return 1;
      return 0;
    });

    const starred = tasks.filter(t => t.title.startsWith('★') || t.title.startsWith('*'));
    const normal  = tasks.filter(t => !t.title.startsWith('★') && !t.title.startsWith('*'));

    const buildTask = task => {
      const title   = task.title.replace(/^[★\*]\s*/, '');
      const starred = task.title.startsWith('★') || task.title.startsWith('*');

      let dueHtml = '';
      if (task.due) {
        const dueDate = new Date(task.due); dueDate.setHours(0,0,0,0);
        const diff = Math.round((dueDate - today) / 86400000);
        let label = '', cls = 'task-due';
        if      (diff < 0)   { label = `${Math.abs(diff)}d overdue`; cls += ' overdue'; }
        else if (diff === 0) { label = 'Today';    cls += ' today'; }
        else if (diff === 1) { label = 'Tomorrow'; }
        else                 { label = dueDate.toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }
        dueHtml = `<span class="${cls}">${label}</span>`;
      }

      return `
        <div class="task-item" data-list="${escHtml(task.listId)}" data-task="${escHtml(task.id)}">
          <div class="task-check" onclick="handleCheck(this)"></div>
          <div class="task-info">
            <div class="task-title">${escHtml(title)}</div>
            ${dueHtml ? `<div class="task-meta">${dueHtml}</div>` : ''}
            ${task.notes ? `<div class="task-notes">${escHtml(task.notes.substring(0,100))}${task.notes.length>100?'…':''}</div>` : ''}
          </div>
          ${starred ? `<div class="task-star">★</div>` : ''}
        </div>`;
    };

    let html = '';
    if (starred.length) {
      html += `<div class="task-section-label">Starred</div>`;
      starred.forEach(t => html += buildTask(t));
    }
    if (normal.length) {
      if (starred.length) html += `<div class="task-section-label">Tasks</div>`;
      normal.forEach(t => html += buildTask(t));
    }

    container.innerHTML = html;
  }

  // ── Complete ──────────────────────────────────────────────
  async function completeTask(listId, taskId) {
    try {
      const res = await fetch(`${API}/tasks/${listId}/${taskId}/complete`, {
        method: 'PATCH',
        headers: authHeaders()
      });
      if (!res.ok) throw new Error('complete failed');
      setTimeout(fetchTasks, 800);
    } catch(e) {
      console.error('completeTask', e);
    }
  }

  function handleCheck(el) {
    const item   = el.closest('.task-item');
    const listId = item.dataset.list;
    const taskId = item.dataset.task;

    el.classList.add('striking');
    item.querySelector('.task-title').classList.add('striking');
    setTimeout(() => {
      item.classList.add('completing');
      setTimeout(() => item.remove(), 380);
    }, 600);

    completeTask(listId, taskId);
  }

  // ── Helpers ───────────────────────────────────────────────
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Clock ─────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const hh  = String(now.getHours()).padStart(2,'0');
    const mm  = String(now.getMinutes()).padStart(2,'0');
    const col = now.getSeconds() % 2 === 0 ? '<span>:</span>' : '<span style="opacity:.25">:</span>';
    document.getElementById('dt-time').innerHTML = hh + col + mm;
    document.getElementById('dt-date').textContent = now.toLocaleDateString('en-GB', {
      weekday:'long', day:'numeric', month:'long', year:'numeric'
    });
  }

  // ── Fullscreen ────────────────────────────────────────────
  function toggleFullscreen() {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
  document.addEventListener('fullscreenchange', () => {
    const fs = !!document.fullscreenElement;
    document.getElementById('fs-enter').style.display = fs ? 'none' : '';
    document.getElementById('fs-exit').style.display  = fs ? ''     : 'none';
  });

  // ── Boot ──────────────────────────────────────────────────
  updateClock();
  setInterval(updateClock, 1000);
  checkAuth();
  setInterval(fetchTasks, 30 * 1000);
</script>

</body>
</html>
